<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="script.js" defer></script>
</head>
<body>
    <div class="background-blobs"></div>
    <div class="container">
        <h1>Inspirify</h1>
        <div class="quote-card">
            <i class="fas fa-quote-left icon-quote"></i>
            <p id="quote" class="quote">Click the button to get Quotes.</p>
            
            <div class="info-container">
                <span id="author" class="author"></span>
                <span id="category" class="category"></span>
            </div>

            <div class="divider"></div>

            <div class="actions">
                <button id="copy-btn" title="Copy to Clipboard"><i class="far fa-copy"></i></button>
                <button id="generatebtn" class="generate">New Quote</button>
            </div>
        </div>
    </div>
</body>
</html>
